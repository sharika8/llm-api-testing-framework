name: LLM API Testing Framework
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live:
        description: Run live Claude API tests
        type: boolean
        default: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unit-tests:
    name: Unit Tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pytest pytest-html pydantic python-dotenv
      - name: Run unit tests
        run: |
          mkdir -p reports
          pytest tests/prompt_injection/ tests/hallucination/ tests/structured_output/ tests/consistency/ \
            -v --tb=short --html=reports/unit-report.html -x
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: reports/
          retention-days: 30
  validator-smoke:
    name: Validator Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pydantic
      - name: Smoke test validator
        run: |
          python -c "
          from src.validators.response_validators import LLMResponseValidator
          v = LLMResponseValidator('{"key": "value"}')
          v.is_valid_json().has_json_keys('key').not_empty()
          assert v.passed
          print('Validator smoke: PASS')
          v2 = LLMResponseValidator('not json')
          v2.is_valid_json()
          assert not v2.passed
          print('Invalid JSON detection: PASS')
          v3 = LLMResponseValidator('Contact at test@example.com')
          v3.no_pii()
          assert not v3.passed
          print('PII detection: PASS')
          print('All smoke tests passed')
          "
  live-api-tests:
    name: Live Claude API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: vars.ANTHROPIC_API_KEY != '' || github.event.inputs.run_live == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run live tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p reports
          pytest tests/ -v --tb=short --html=reports/live-report.html -x
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-api-report
          path: reports/
          retention-days: 30
  all-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, validator-smoke]
    if: always()
    steps:
      - name: Check
        run: |
          for r in "${{ needs.unit-tests.result }}" "${{ needs.validator-smoke.result }}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then echo "Failed: $r"; exit 1; fi
          done
          echo "All checks passed"
